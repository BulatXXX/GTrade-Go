openapi: 3.0.3
info:
  title: GTrade Catalog Service API
  version: 1.0.0
  description: OpenAPI specification for the first MVP of catalog-service.
servers:
  - url: http://localhost:8084
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      tags: [health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /items:
    get:
      summary: List catalog items
      tags: [items]
      parameters:
        - in: query
          name: game
          schema:
            type: string
          description: Filter by game code
        - in: query
          name: source
          schema:
            type: string
          description: Filter by source code
        - in: query
          name: language
          schema:
            type: string
          description: Optional response language code for localized_name and localized_description
        - in: query
          name: active_only
          schema:
            type: boolean
            default: true
          description: Return only active items
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        '200':
          description: Item list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItemsResponse'
        '400':
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a catalog item
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Item already exists for game, source and external_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Create item failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/search:
    get:
      summary: Search items by name
      tags: [items]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query
        - in: query
          name: game
          schema:
            type: string
          description: Optional game filter
        - in: query
          name: language
          schema:
            type: string
          description: Optional translation language code, for example ru or en
        - in: query
          name: active_only
          schema:
            type: boolean
            default: true
          description: Return only active items
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItemsResponse'
        '400':
          description: Invalid search params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/upsert:
    post:
      summary: Create or update a catalog item by game, source and external_id
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '200':
          description: Item created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{id}:
    get:
      summary: Get item by id
      tags: [items]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: language
          schema:
            type: string
          description: Optional response language code for localized_name and localized_description
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Get item failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{id}/prices/history:
    get:
      summary: Get historical daily prices for an item
      description: |
        Returns daily top-price history already stored in `catalog-service`.
        One row represents one day for a given `item_id + source + game_mode`.
        Repeated collection on the same day updates the existing row.
      tags: [pricing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: game_mode
          schema:
            type: string
          description: Optional filter for game mode. Mainly relevant for Tarkov (`regular` or `pve`).
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 365
            default: 30
      responses:
        '200':
          description: Historical daily prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistoryResponse'
              examples:
                default:
                  summary: Warframe daily history
                  value:
                    item_id: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
                    history:
                      - item_id: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
                        source: warframe-market
                        value: 125
                        currency: PLAT
                        collected_on: 2026-05-09
                        collected_at: 2026-05-09T09:00:00Z
                tarkovPve:
                  summary: Tarkov pve history
                  value:
                    item_id: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
                    game_mode: pve
                    history:
                      - item_id: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
                        source: tarkov.dev
                        game_mode: pve
                        value: 14161
                        currency: RUB
                        collected_on: 2026-05-09
                        collected_at: 2026-05-09T10:15:00Z
        '400':
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Price history fetch failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update an existing catalog item
      tags: [items]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Update item failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Deactivate catalog item
      description: Default delete behavior is soft delete via is_active=false.
      tags: [items]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteItemResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Delete item failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/stats:
    get:
      summary: Get catalog admin stats
      tags: [admin]
      responses:
        '200':
          description: Catalog stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogStatsResponse'
  /admin/localizations/coverage:
    get:
      summary: Get localization coverage by game and language
      tags: [admin]
      parameters:
        - in: query
          name: game
          schema:
            type: string
          description: Optional game filter, for example `warframe`, `eve` or `tarkov`
      responses:
        '200':
          description: Localization coverage rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalizationCoverageResponse'
  /admin/jobs/catalog-import:
    post:
      summary: Start catalog import job
      description: |
        Starts background metadata import for one game and one target language.
        Progress is exposed through `/admin/jobs` and `/admin/jobs/{id}`.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCatalogImportRequest'
      responses:
        '202':
          description: Import job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminJobStatusResponse'
        '400':
          description: Invalid import request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/price-history-sync:
    post:
      summary: Start full price history sync job
      tags: [admin]
      responses:
        '202':
          description: Price history job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminJobStatusResponse'
  /admin/jobs:
    get:
      summary: List admin jobs
      tags: [admin]
      responses:
        '200':
          description: Background jobs
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminJobStatusResponse'
  /admin/jobs/{id}:
    get:
      summary: Get admin job status
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminJobStatusResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: catalog-service
    ItemTranslation:
      type: object
      required: [language_code, name]
      properties:
        language_code:
          type: string
          example: ru
        name:
          type: string
          example: Праймед Континуити
        description:
          type: string
          example: Модификация, увеличивающая длительность способностей.
    Item:
      type: object
      required:
        - id
        - game
        - source
        - external_id
        - slug
        - name
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
        game:
          type: string
          example: warframe
        source:
          type: string
          example: market
        external_id:
          type: string
          example: primed-continuity
        slug:
          type: string
          example: primed-continuity
        name:
          type: string
          example: Primed Continuity
        localized_name:
          type: string
          example: Праймед Континуити
        description:
          type: string
          example: Mod that increases ability duration.
        localized_description:
          type: string
          example: Модификация, увеличивающая длительность способностей.
        localized_language:
          type: string
          example: ru
        image_url:
          type: string
          example: https://cdn.example.com/items/primed-continuity.png
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        translations:
          type: array
          items:
            $ref: '#/components/schemas/ItemTranslation'
    CreateItemRequest:
      type: object
      required: [game, source, external_id, slug, name]
      properties:
        game:
          type: string
          example: warframe
        source:
          type: string
          example: market
        external_id:
          type: string
          example: primed-continuity
        slug:
          type: string
          example: primed-continuity
        name:
          type: string
          example: Primed Continuity
        description:
          type: string
          example: Mod that increases ability duration.
        image_url:
          type: string
          example: https://cdn.example.com/items/primed-continuity.png
        translations:
          type: array
          items:
            $ref: '#/components/schemas/ItemTranslation'
    UpdateItemRequest:
      type: object
      properties:
        slug:
          type: string
          example: primed-continuity
        name:
          type: string
          example: Primed Continuity
        description:
          type: string
          example: Mod that increases ability duration.
        image_url:
          type: string
          example: https://cdn.example.com/items/primed-continuity.png
        is_active:
          type: boolean
          example: true
        translations:
          type: array
          items:
            $ref: '#/components/schemas/ItemTranslation'
    ItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Item'
    ListItemsResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        limit:
          type: integer
          format: int32
          example: 20
        offset:
          type: integer
          format: int32
          example: 0
    PriceHistoryEntry:
      type: object
      required: [item_id, source, value, currency, collected_on, collected_at]
      properties:
        item_id:
          type: string
          example: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
        source:
          type: string
          example: tarkov.dev
        game_mode:
          type: string
          example: regular
        value:
          type: number
          format: double
          example: 14161
        currency:
          type: string
          example: RUB
        collected_on:
          type: string
          format: date
          example: 2026-05-03
        collected_at:
          type: string
          format: date-time
    PriceHistoryResponse:
      type: object
      required: [item_id, history]
      properties:
        item_id:
          type: string
          example: item_01HZY3Y8VYB1T2Q9R5R9K7N1AA
        game_mode:
          type: string
          example: pve
        history:
          type: array
          items:
            $ref: '#/components/schemas/PriceHistoryEntry'
    DeleteItemResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: deactivated
    CatalogStatsResponse:
      type: object
      required: [total_items, active_items, price_history_rows]
      properties:
        total_items:
          type: integer
          example: 12000
        active_items:
          type: integer
          example: 11800
        price_history_rows:
          type: integer
          example: 564000
    LocalizationCoverageRow:
      type: object
      required:
        - game
        - language_code
        - total_items
        - translated_items
        - missing_items
        - coverage_percent
        - description_filled_items
        - description_coverage_percent
      properties:
        game:
          type: string
          example: warframe
        language_code:
          type: string
          example: ru
        total_items:
          type: integer
          example: 1000
        translated_items:
          type: integer
          example: 760
        missing_items:
          type: integer
          example: 240
        coverage_percent:
          type: number
          format: double
          example: 76
        description_filled_items:
          type: integer
          example: 710
        description_coverage_percent:
          type: number
          format: double
          example: 71
    LocalizationCoverageResponse:
      type: object
      required: [coverage]
      properties:
        game:
          type: string
          example: warframe
        coverage:
          type: array
          items:
            $ref: '#/components/schemas/LocalizationCoverageRow'
    AdminCatalogImportRequest:
      type: object
      required: [game]
      properties:
        game:
          type: string
          example: warframe
        language:
          type: string
          example: ru
        limit:
          type: integer
          format: int32
          minimum: 0
          example: 250
    AdminJobStatusResponse:
      type: object
      required: [id, type, status, progress_percent, processed, total, started_at]
      properties:
        id:
          type: string
          example: catalog-import-1746754500000000000
        type:
          type: string
          example: catalog-import
        status:
          type: string
          example: running
        progress_percent:
          type: integer
          example: 42
        processed:
          type: integer
          example: 420
        total:
          type: integer
          example: 1000
        error:
          type: string
          example: unsupported source
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties:
            type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: item not found
