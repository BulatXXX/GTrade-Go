openapi: 3.0.3
info:
  title: GTrade User Asset Service API
  version: 1.0.0
  description: OpenAPI specification for user profile, cloud watchlist and preferences.
servers:
  - url: http://localhost:8082
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      tags: [health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /users:
    post:
      summary: Create user profile
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      summary: Get user profile and watchlist
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithWatchlistResponse'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update user profile
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /watchlist:
    get:
      summary: Get cloud watchlist
      tags: [watchlist]
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Watchlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add item to watchlist
      tags: [watchlist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWatchlistRequest'
      responses:
        '201':
          description: Watchlist item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItem'
        '400':
          description: Invalid request or catalog item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Watchlist item already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /watchlist/{id}:
    delete:
      summary: Delete watchlist item
      tags: [watchlist]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Watchlist item deleted
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Watchlist item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /watchlist/{id}/notifications:
    put:
      summary: Update notifications for one watchlist item
      tags: [watchlist]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWatchlistNotificationsRequest'
      responses:
        '200':
          description: Watchlist notification flag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItem'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Watchlist item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /recent:
    get:
      summary: Get recent watchlist items
      tags: [watchlist]
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Recent watchlist items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /preferences:
    get:
      summary: Get user preferences
      tags: [preferences]
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update user preferences
      tags: [preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/price-alerts/send:
    post:
      summary: Send manual price alerts immediately
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminManualPriceAlertRequest'
      responses:
        '200':
          description: Manual price alert dispatch completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminManualPriceAlertResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/messages/send:
    post:
      summary: Send custom admin message through notification-service
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSendMessageRequest'
      responses:
        '200':
          description: Admin message dispatch completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSendMessageResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/scheduler-state:
    get:
      summary: List background scheduler jobs and their last execution state
      tags: [admin]
      responses:
        '200':
          description: Scheduler state snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerStateResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: user-asset-service
    CreateUserRequest:
      type: object
      required: [user_id, display_name]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        display_name:
          type: string
          example: Alice
        avatar_url:
          type: string
          example: https://cdn.example.com/avatar.png
        bio:
          type: string
          example: Trader
    UpdateUserRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          example: Alice Updated
        avatar_url:
          type: string
          example: https://cdn.example.com/avatar-2.png
        bio:
          type: string
          example: Collector
    AddWatchlistRequest:
      type: object
      required: [user_id, item_id]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        item_id:
          type: string
          example: item-uuid-1
    UpdatePreferencesRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        currency:
          type: string
          example: usd
        notifications_enabled:
          type: boolean
          example: true
        notification_mode:
          type: string
          example: daily_digest
          enum: [daily_digest, immediate]
        notification_time:
          type: string
          example: 09:00
    UpdateWatchlistNotificationsRequest:
      type: object
      required: [user_id, notify_enabled]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        notify_enabled:
          type: boolean
          example: true
    AdminManualPriceAlertRequest:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 42
        force_send:
          type: boolean
          example: false
          description: |
            If `true`, ignore the diff-detection state and send each subscribed
            user a one-shot snapshot of their current watchlist values. The
            internal `watchlist_notification_state` rows are NOT touched, so
            the next regular dispatch still behaves as if no manual send
            happened. Use this for "resend last known prices" admin actions.
      description: If omitted, the service checks every subscribed watchlist user and sends only detected price changes.
    AdminManualPriceAlertResponse:
      type: object
      required: [mode, users_checked, emails_sent, changes_found, users_with_diff, users_skipped]
      properties:
        target_user_id:
          type: integer
          format: int64
          example: 42
        mode:
          type: string
          enum: [diff, snapshot]
          example: diff
          description: |
            `diff` — regular detect+send flow, only price changes are emailed.
            `snapshot` — force_send flow, every subscribed line is included
            with delta=0 (Subject "Your GTrade watchlist snapshot").
        users_checked:
          type: integer
          example: 15
        emails_sent:
          type: integer
          example: 6
        changes_found:
          type: integer
          example: 24
        users_with_diff:
          type: integer
          example: 6
        users_skipped:
          type: integer
          example: 1
          description: |
            Users that were eligible (had matching subscriptions/changes) but
            email was not delivered. Reason is recorded in service logs as
            `skip_reason` (`auth_error`, `contact_nil`, `email_empty`,
            `email_not_verified`).
    SchedulerStateResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SchedulerStateItem'
    SchedulerStateItem:
      type: object
      required: [job_name, status, last_processed, last_total, runs_total, updated_at]
      properties:
        job_name:
          type: string
          example: price_alert_dispatch
        status:
          type: string
          enum: [idle, running, ok, error]
          example: ok
        last_started_at:
          type: string
          format: date-time
          nullable: true
        last_finished_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true
          example: "send price alert email: smtp timeout"
        last_processed:
          type: integer
          example: 0
        last_total:
          type: integer
          example: 0
        runs_total:
          type: integer
          format: int64
          example: 1234
        updated_at:
          type: string
          format: date-time
        interval_seconds:
          type: integer
          format: int64
          nullable: true
          description: Tick period for ticker-driven jobs (price_alert_dispatch).
          example: 60
        next_run_at:
          type: string
          format: date-time
          nullable: true
          description: Computed as last_started_at + interval. Omitted when the job has no schedule or has never run.
    AdminSendMessageRequest:
      type: object
      required: [subject]
      properties:
        user_id:
          type: integer
          format: int64
          example: 42
        subject:
          type: string
          example: GTrade maintenance
        html_body:
          type: string
          example: "<p>Maintenance starts at 22:00 UTC</p>"
        text_body:
          type: string
          example: Maintenance starts at 22:00 UTC
      description: If `user_id` is omitted, the message is sent to all verified users.
    AdminSendMessageResponse:
      type: object
      required: [users_checked, emails_sent]
      properties:
        target_user_id:
          type: integer
          format: int64
          example: 42
        users_checked:
          type: integer
          example: 125
        emails_sent:
          type: integer
          example: 125
    UserProfileResponse:
      type: object
      required: [user_id, display_name, avatar_url, bio, created_at, updated_at]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        display_name:
          type: string
          example: Alice
        avatar_url:
          type: string
          example: https://cdn.example.com/avatar.png
        bio:
          type: string
          example: Trader
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CatalogItemSummary:
      type: object
      required: [id, game, source, name, slug, image_url]
      properties:
        id:
          type: string
          example: item-uuid-1
        game:
          type: string
          example: warframe
        source:
          type: string
          example: market
        name:
          type: string
          example: Frost Prime Set
        slug:
          type: string
          example: frost_prime_set
        image_url:
          type: string
          example: https://cdn.example.com/frost.png
    WatchlistItem:
      type: object
      required: [id, user_id, item_id, notify_enabled, created_at]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user_id:
          type: integer
          format: int64
          example: 1
        item_id:
          type: string
          example: item-uuid-1
        notify_enabled:
          type: boolean
          example: true
        item:
          $ref: '#/components/schemas/CatalogItemSummary'
        created_at:
          type: string
          format: date-time
    WatchlistResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    UserWithWatchlistResponse:
      type: object
      required: [user, watchlist]
      properties:
        user:
          $ref: '#/components/schemas/UserProfileResponse'
        watchlist:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    PreferencesResponse:
      type: object
      required: [user_id, currency, notifications_enabled, notification_mode, notification_time, updated_at]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        currency:
          type: string
          example: usd
        notifications_enabled:
          type: boolean
          example: true
        notification_mode:
          type: string
          example: daily_digest
        notification_time:
          type: string
          example: 09:00
        updated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: valid user_id query param is required
