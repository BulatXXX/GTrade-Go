openapi: 3.0.3
info:
  title: GTrade API Integration Service API
  version: 1.0.0
  description: OpenAPI specification for runtime integration with Warframe, EVE and Tarkov data sources.
servers:
  - url: http://localhost:8083
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      tags: [health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /search:
    get:
      summary: Search items in external providers
      tags: [search]
      parameters:
        - in: query
          name: game
          required: true
          schema:
            type: string
            enum: [warframe, eve, tarkov]
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: game_mode
          schema:
            type: string
            enum: [regular, pve]
          description: Only relevant for `tarkov`. Defaults to `regular`.
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchItemsResponse'
        '400':
          description: Invalid request or unsupported game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{id}:
    get:
      summary: Get normalized item card from external provider
      tags: [items]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: game
          required: true
          schema:
            type: string
            enum: [warframe, eve, tarkov]
        - in: query
          name: game_mode
          schema:
            type: string
            enum: [regular, pve]
          description: Only relevant for `tarkov`. Defaults to `regular`.
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Invalid request or unsupported game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{id}/prices:
    get:
      summary: Get full normalized pricing snapshot
      tags: [pricing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: game
          required: true
          schema:
            type: string
            enum: [warframe, eve, tarkov]
        - in: query
          name: game_mode
          schema:
            type: string
            enum: [regular, pve]
          description: Only relevant for `tarkov`. Defaults to `regular`.
      responses:
        '200':
          description: Pricing snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'
        '400':
          description: Invalid request or unsupported game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{id}/top-price:
    get:
      summary: Get simplified top price response
      tags: [pricing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: game
          required: true
          schema:
            type: string
            enum: [warframe, eve, tarkov]
        - in: query
          name: game_mode
          schema:
            type: string
            enum: [regular, pve]
          description: Only relevant for `tarkov`. Defaults to `regular`.
      responses:
        '200':
          description: Top price response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopPriceResponse'
        '400':
          description: Invalid request or unsupported game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api-integration-service
    SearchItemsResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        limit:
          type: integer
          format: int32
          example: 20
        offset:
          type: integer
          format: int32
          example: 0
    ItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Item'
    PriceResponse:
      type: object
      required: [price]
      properties:
        price:
          $ref: '#/components/schemas/PriceSnapshot'
    TopPriceResponse:
      type: object
      required: [item_id, game, source, currency, fetched_at]
      properties:
        item_id:
          type: string
          example: frost_prime_set
        game:
          type: string
          example: warframe
        game_mode:
          type: string
          example: pve
        source:
          type: string
          example: warframe-market
        currency:
          type: string
          example: PLAT
        value:
          type: number
          format: double
          example: 71
        fetched_at:
          type: string
          format: date-time
    Item:
      type: object
      required: [id, game, source, name]
      properties:
        id:
          type: string
          example: frost_prime_set
        game:
          type: string
          example: warframe
        game_mode:
          type: string
          example: pve
        source:
          type: string
          example: tarkov-dev
        name:
          type: string
          example: Frost Prime Set
        slug:
          type: string
          example: frost_prime_set
        description:
          type: string
          example: Prime warframe set.
        image_url:
          type: string
          example: https://assets.tarkov.dev/item.webp
        url:
          type: string
          example: https://tarkov.dev/item/makarov
        currency:
          type: string
          example: RUB
        types:
          type: array
          items:
            type: string
    PriceSnapshot:
      type: object
      required: [item_id, game, source, currency, market_kind, fetched_at, pricing, analytics]
      properties:
        item_id:
          type: string
          example: 5448bd6b4bdc2dfc2f8b4569
        game:
          type: string
          example: tarkov
        game_mode:
          type: string
          example: pve
        source:
          type: string
          example: tarkov-dev
        currency:
          type: string
          example: RUB
        market_kind:
          type: string
          example: aggregated_market
        fetched_at:
          type: string
          format: date-time
        pricing:
          $ref: '#/components/schemas/Pricing'
        analytics:
          $ref: '#/components/schemas/PricingAnalysis'
        raw_context:
          type: object
          additionalProperties: true
    Pricing:
      type: object
      properties:
        current:
          type: number
          format: double
        top_sell:
          type: number
          format: double
        top_buy:
          type: number
          format: double
        avg_24h:
          type: number
          format: double
        low_24h:
          type: number
          format: double
        high_24h:
          type: number
          format: double
        base_price:
          type: number
          format: double
        adjusted_price:
          type: number
          format: double
        change_48h_percent:
          type: number
          format: double
        spread:
          type: number
          format: double
    PricingAnalysis:
      type: object
      properties:
        sample_size:
          type: integer
          format: int32
        low:
          type: number
          format: double
        high:
          type: number
          format: double
        median:
          type: number
          format: double
        volume_24h:
          type: number
          format: double
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid request
