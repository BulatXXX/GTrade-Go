services:
  postgres-auth:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gtrade_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ../services/auth-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gtrade_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-user-asset:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gtrade_user_asset
    ports:
      - "5434:5432"
    volumes:
      - postgres_user_asset_data:/var/lib/postgresql/data
      - ../services/user-asset-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gtrade_user_asset"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-catalog:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gtrade_catalog
    ports:
      - "5436:5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
      - ../services/catalog-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gtrade_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gtrade_notification
    ports:
      - "5437:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ../services/notification-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gtrade_notification"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ../services/api-gateway
    env_file: ./.env
    environment:
      SERVICE_NAME: api-gateway
      PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/auth-service.Dockerfile
    env_file: ./.env
    environment:
      SERVICE_NAME: auth-service
      PORT: ${AUTH_SERVICE_PORT}
      DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      notification-service:
        condition: service_started

  user-asset-service:
    build: ../services/user-asset-service
    env_file: ./.env
    environment:
      SERVICE_NAME: user-asset-service
      PORT: ${USER_ASSET_SERVICE_PORT}
      DATABASE_URL: ${USER_ASSET_SERVICE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8082:8082"
    depends_on:
      postgres-user-asset:
        condition: service_healthy

  api-integration-service:
    build: ../services/api-integration-service
    env_file: ./.env
    environment:
      SERVICE_NAME: api-integration-service
      PORT: ${API_INTEGRATION_SERVICE_PORT}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8083:8083"

  catalog-service:
    build: ../services/catalog-service
    env_file: ./.env
    environment:
      SERVICE_NAME: catalog-service
      PORT: ${CATALOG_SERVICE_PORT}
      DATABASE_URL: ${CATALOG_SERVICE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8084:8084"
    depends_on:
      postgres-catalog:
        condition: service_healthy

  notification-service:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/notification-service.Dockerfile
    env_file: ./.env
    environment:
      SERVICE_NAME: notification-service
      PORT: ${NOTIFICATION_SERVICE_PORT}
      DATABASE_URL: ${NOTIFICATION_SERVICE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8085:8085"
    depends_on:
      postgres-notification:
        condition: service_healthy

volumes:
  postgres_auth_data:
  postgres_user_asset_data:
  postgres_catalog_data:
  postgres_notification_data:
