services:
  postgres-auth:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gtrade_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ../services/auth-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gtrade_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/auth-service.Dockerfile
    env_file: ./.env
    environment:
      SERVICE_NAME: auth-service
      PORT: ${AUTH_SERVICE_PORT}
      DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy

volumes:
  postgres_auth_data:
